name: Security

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1"
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  bandit:
    name: Bandit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Sync dependencies
        run: uv sync --dev --locked

      - name: Run Bandit
        run: uv run bandit -q -r src

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Sync dependencies
        run: uv sync --dev --locked

      - name: Run pip-audit
        run: uv run pip-audit --progress-spinner off
